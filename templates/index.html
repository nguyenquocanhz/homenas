<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeNAS Server - Visual File Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                     radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                     #0f172a;
      --glass-bg: rgba(30, 41, 59, 0.65);
      --glass-hover: rgba(51, 65, 85, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.4);
      --purple-glow: rgba(168, 85, 247, 0.4);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Header */
    header {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .logo-title {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ffffff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Main Grid Layout */
    .container {
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
      padding: 1.75rem;
      flex: 1;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1.75rem;
    }

    @media (max-width: 1024px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    /* Sidebar Components */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.35);
      transition: border-color 0.3s ease;
    }

    .glass-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    .card-header {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.07);
      height: 12px;
      border-radius: 10px;
      overflow: hidden;
      margin: 0.75rem 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #6366f1, #a855f7);
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 12px var(--purple-glow);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .stat-row strong {
      color: var(--text-main);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .btn {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      border: none;
      padding: 0.85rem 1.5rem;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.95rem;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      border: 1px solid var(--glass-border);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      box-shadow: none;
    }

    /* Explorer Content */
    .content-area {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* Controls Bar */
    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .breadcrumb-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      padding: 0.75rem 1.25rem;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      font-size: 0.92rem;
      flex: 1;
    }

    .breadcrumb-item {
      color: #a5b4fc;
      cursor: pointer;
      font-weight: 600;
      transition: color 0.2s;
    }

    .breadcrumb-item:hover {
      color: white;
    }

    .filter-tabs {
      display: flex;
      background: var(--glass-bg);
      padding: 0.35rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      gap: 0.25rem;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 0.5rem 0.9rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    /* File Table */
    .file-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    .file-table th {
      text-align: left;
      padding: 1rem 1.25rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--glass-border);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }

    .file-table td {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      vertical-align: middle;
    }

    .file-row {
      transition: background 0.2s ease;
      cursor: pointer;
    }

    .file-row:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .file-name-cell {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      font-weight: 600;
    }

    .file-icon {
      font-size: 1.35rem;
      width: 28px;
      text-align: center;
    }

    .file-icon.folder { color: #f59e0b; }
    .file-icon.image { color: #ec4899; }
    .file-icon.video { color: #a855f7; }
    .file-icon.audio { color: #10b981; }
    .file-icon.document { color: #3b82f6; }
    .file-icon.archive { color: #f97316; }
    .file-icon.file { color: #94a3b8; }

    .action-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      transition: all 0.2s;
      margin-left: 0.3rem;
    }

    .action-btn:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.15);
    }

    .action-btn.delete:hover {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.3);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #1e293b;
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 1.75rem;
      width: 90%;
      max-width: 520px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    .modal-header {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body input {
      width: 100%;
      padding: 0.85rem 1.1rem;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
      outline: none;
    }

    .modal-body input:focus {
      border-color: var(--accent);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    select.form-control option {
      background-color: #1e293b;
      color: #f8fafc;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo-area">
      <div class="logo-icon"><i class="fa-solid fa-server"></i></div>
      <div>
        <div class="logo-title">HomeNAS Server</div>
        <div style="font-size: 0.78rem; color: var(--text-muted); font-weight: 500;">Private Cloud Storage & Media Server</div>
      </div>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <span style="font-size: 0.85rem; color: var(--text-muted); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); padding: 0.35rem 0.85rem; border-radius: 20px;">
        <i class="fa-solid fa-circle" style="color: var(--success); font-size: 0.6rem; margin-right: 0.3rem;"></i> NAS Online
      </span>
      <button class="action-btn delete" onclick="handleLogout()" title="Đăng xuất" style="padding: 0.4rem 0.75rem; display: flex; align-items: center; gap: 0.4rem; font-weight: 600;">
        <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
      </button>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Storage Meter Card -->
      <div class="glass-card">
        <div class="card-header">
          <span>Ổ đĩa hệ thống</span>
          <i class="fa-solid fa-hard-drive" style="color: var(--accent);"></i>
        </div>
        <div class="progress-bar-bg">
          <div id="diskProgress" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
        <div class="stat-row">
          <span>Đã dùng: <strong id="diskUsed">-</strong></span>
          <span>Trống: <strong id="diskFree">-</strong></span>
        </div>
        <div class="stat-row" style="margin-top: 0.4rem;">
          <span>Tổng dung lượng: <strong id="diskTotal">-</strong></span>
          <span><strong id="diskPercent" style="color: #a5b4fc;">0%</strong></span>
        </div>
      </div>

      <!-- Performance Card -->
      <div class="glass-card">
        <div class="card-header">
          <span>Tải Server</span>
          <i class="fa-solid fa-microchip" style="color: #a855f7;"></i>
        </div>
        <div class="stat-row">
          <span>CPU Usage:</span>
          <strong id="cpuPercent">0%</strong>
        </div>
        <div class="stat-row">
          <span>RAM Usage:</span>
          <strong id="ramPercent">0%</strong>
        </div>
      </div>

      <!-- Actions -->
      <div class="btn-group">
        <button class="btn" onclick="triggerUpload()"><i class="fa-solid fa-cloud-arrow-up"></i> Tải file lên NAS</button>
        <button class="btn btn-secondary" onclick="openMkdirModal()"><i class="fa-solid fa-folder-plus"></i> Tạo thư mục mới</button>
        <button class="btn btn-secondary" onclick="openResendModal()"><i class="fa-solid fa-envelope"></i> Cấu hình Email Alert (Resend)</button>
        <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(event)">
      </div>
    </aside>

    <!-- Explorer Main Area -->
    <main class="content-area">
      <!-- Controls / Breadcrumb Bar -->
      <div class="controls-bar">
        <div class="breadcrumb-bar" id="breadcrumbBar">
          <span class="breadcrumb-item" onclick="navigateTo('')"><i class="fa-solid fa-house"></i> Storage</span>
        </div>

        <div class="filter-tabs">
          <button class="tab-btn active" onclick="filterCategory('all', this)">Tất cả</button>
          <button class="tab-btn" onclick="filterCategory('image', this)">Ảnh</button>
          <button class="tab-btn" onclick="filterCategory('video', this)">Video</button>
          <button class="tab-btn" onclick="filterCategory('document', this)">Tài liệu</button>
        </div>
      </div>

      <!-- File List Table -->
      <div class="glass-card" style="padding: 0; overflow: hidden;">
        <table class="file-table">
          <thead>
            <tr>
              <th>Tên File / Thư mục</th>
              <th style="width: 140px;">Dung lượng</th>
              <th style="width: 180px;">Ngày cập nhật</th>
              <th style="width: 120px; text-align: right;">Hành động</th>
            </tr>
          </thead>
          <tbody id="fileList">
            <tr>
              <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></i><br>
                Đang nạp danh sách tệp tin...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Mkdir Modal -->
  <div class="modal-overlay" id="mkdirModal">
    <div class="modal-box">
      <div class="modal-header">
        <span>Tạo thư mục mới</span>
        <i class="fa-solid fa-xmark" style="cursor: pointer; color: var(--text-muted);" onclick="closeMkdirModal()"></i>
      </div>
      <div class="modal-body">
        <input type="text" id="folderNameInput" placeholder="Nhập tên thư mục...">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeMkdirModal()">Hủy bỏ</button>
        <button class="btn" onclick="submitMkdir()">Tạo ngay</button>
      </div>
    </div>
  </div>

  <!-- Resend Modal -->
  <div class="modal-overlay" id="resendModal">
    <div class="modal-box">
      <div class="modal-header">
        <span>Cấu hình Resend Email API</span>
        <i class="fa-solid fa-xmark" style="cursor: pointer; color: var(--text-muted);" onclick="closeResendModal()"></i>
      </div>
      <div class="modal-body">
        <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem;">Resend API Key (re_...)</label>
        <input type="text" id="resendApiKeyInput" placeholder="re_JQ6uJLyg_5oUMtDYUn31v7sTPU2gHSNxi">

        <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem;">From Email người gửi</label>
        <input type="text" id="resendFromEmailInput" placeholder="Acme <onboarding@resend.dev>">

        <label style="font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem;">Email nhận thông báo / xác thực</label>
        <input type="text" id="resendNotifyEmailInput" placeholder="delivered@resend.dev">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="sendTestVerificationEmail()"><i class="fa-solid fa-paper-plane"></i> Gửi Mail Xác Thực Thử Nghiệm</button>
        <button class="btn" onclick="saveResendConfig()"><i class="fa-solid fa-floppy-disk"></i> Lưu Cấu Hình</button>
      </div>
    </div>
  </div>

  <script>
    let currentPath = "";
    let allItems = [];
    let currentFilter = "all";

    async function loadSystemStats() {
      try {
        const res = await fetch('/api/system');
        const data = await res.json();
        document.getElementById('diskUsed').innerText = data.disk.used;
        document.getElementById('diskFree').innerText = data.disk.free;
        document.getElementById('diskTotal').innerText = data.disk.total;
        document.getElementById('diskPercent').innerText = data.disk.percent + '%';
        document.getElementById('diskProgress').style.width = data.disk.percent + '%';
        document.getElementById('cpuPercent').innerText = data.cpu.percent + '%';
        document.getElementById('ramPercent').innerText = data.memory.percent + '%';
      } catch (e) {
        console.error(e);
      }
    }

    async function loadFiles(path = "") {
      currentPath = path;
      updateBreadcrumb(path);
      try {
        const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
        if (!res.ok) throw new Error("Directory error");
        const data = await res.json();
        allItems = data.items;
        renderFiles();
      } catch (e) {
        console.error(e);
      }
    }

    function renderFiles() {
      const tbody = document.getElementById('fileList');
      tbody.innerHTML = "";

      let filtered = allItems;
      if (currentFilter !== "all") {
        filtered = allItems.filter(item => item.is_dir || item.icon === currentFilter);
      }

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 3rem;">Thư mục trống</td></tr>`;
        return;
      }

      filtered.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = 'file-row';

        let iconClass = 'fa-file file';
        if (item.icon === 'folder') iconClass = 'fa-folder folder';
        else if (item.icon === 'image') iconClass = 'fa-file-image image';
        else if (item.icon === 'video') iconClass = 'fa-file-video video';
        else if (item.icon === 'audio') iconClass = 'fa-file-audio audio';
        else if (item.icon === 'archive') iconClass = 'fa-file-zipper archive';
        else if (item.icon === 'document') iconClass = 'fa-file-lines document';

        tr.innerHTML = `
          <td>
            <div class="file-name-cell" onclick="${item.is_dir ? `navigateTo('${item.path}')` : `downloadFile('${item.path}')`}">
              <i class="fa-solid ${iconClass} file-icon ${item.icon}"></i>
              <span>${item.name}</span>
            </div>
          </td>
          <td>${item.size}</td>
          <td>${item.modified}</td>
          <td style="text-align: right;">
            ${!item.is_dir ? `<button class="action-btn" onclick="downloadFile('${item.path}')" title="Tải về"><i class="fa-solid fa-download"></i></button>` : ''}
            <button class="action-btn delete" onclick="deleteItem('${item.path}')" title="Xóa"><i class="fa-solid fa-trash"></i></button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function filterCategory(cat, btn) {
      currentFilter = cat;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFiles();
    }

    function updateBreadcrumb(path) {
      const bar = document.getElementById('breadcrumbBar');
      bar.innerHTML = `<span class="breadcrumb-item" onclick="navigateTo('')"><i class="fa-solid fa-house"></i> Storage</span>`;
      
      if (!path) return;
      const parts = path.split('/');
      let accumulated = "";
      parts.forEach((p) => {
        if (!p) return;
        accumulated += (accumulated ? '/' : '') + p;
        const currentAccumulated = accumulated;
        bar.innerHTML += ` <span style="color: var(--text-muted);">/</span> <span class="breadcrumb-item" onclick="navigateTo('${currentAccumulated}')">${p}</span>`;
      });
    }

    function navigateTo(path) { loadFiles(path); }
    function triggerUpload() { document.getElementById('fileInput').click(); }

    async function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);
      formData.append('path', currentPath);

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        if (res.ok) {
          loadFiles(currentPath);
          loadSystemStats();
        }
      } catch (e) { alert('Upload lỗi!'); }
      event.target.value = '';
    }

    function downloadFile(path) {
      window.location.href = `/api/download?path=${encodeURIComponent(path)}`;
    }

    async function deleteItem(path) {
      if (!confirm(`Bạn có chắc muốn xóa item này không?`)) return;
      try {
        const res = await fetch(`/api/delete?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
        if (res.ok) {
          loadFiles(currentPath);
          loadSystemStats();
        }
      } catch (e) { alert('Không thể xóa!'); }
    }

    function openMkdirModal() { document.getElementById('mkdirModal').classList.add('active'); }
    function closeMkdirModal() {
      document.getElementById('mkdirModal').classList.remove('active');
      document.getElementById('folderNameInput').value = '';
    }

    async function submitMkdir() {
      const name = document.getElementById('folderNameInput').value.trim();
      if (!name) return;

      const formData = new FormData();
      formData.append('name', name);
      formData.append('path', currentPath);

      try {
        const res = await fetch('/api/mkdir', { method: 'POST', body: formData });
        if (res.ok) {
          closeMkdirModal();
          loadFiles(currentPath);
        }
      } catch (e) { alert('Lỗi tạo thư mục!'); }
    }

    async function openResendModal() {
      try {
        const res = await fetch('/api/resend-config');
        const data = await res.json();
        document.getElementById('resendApiKeyInput').value = data.api_key || "";
        document.getElementById('resendFromEmailInput').value = data.from_email || "Acme <onboarding@resend.dev>";
        document.getElementById('resendNotifyEmailInput').value = data.notify_email || "delivered@resend.dev";
        document.getElementById('resendModal').classList.add('active');
      } catch (e) {
        alert("Lỗi nạp cấu hình Resend!");
      }
    }

    function closeResendModal() {
      document.getElementById('resendModal').classList.remove('active');
    }

    async function saveResendConfig() {
      const apiKey = document.getElementById('resendApiKeyInput').value.trim();
      const fromEmail = document.getElementById('resendFromEmailInput').value.trim();
      const notifyEmail = document.getElementById('resendNotifyEmailInput').value.trim();

      if (!apiKey) { alert("Vui lòng nhập Resend API Key!"); return; }

      const formData = new FormData();
      formData.append('api_key', apiKey);
      formData.append('from_email', fromEmail);
      formData.append('notify_email', notifyEmail);

      try {
        const res = await fetch('/api/save-resend-config', { method: 'POST', body: formData });
        const data = await res.json();
        if (res.ok) {
          alert("✅ Đã lưu cấu hình Resend API thành công!");
          closeResendModal();
        } else {
          alert("❌ Lỗi: " + (data.detail || "Không thể lưu!"));
        }
      } catch (e) { alert("Lỗi khi lưu cấu hình!"); }
    }

    async function sendTestVerificationEmail() {
      const notifyEmail = document.getElementById('resendNotifyEmailInput').value.trim();
      const formData = new FormData();
      if (notifyEmail) formData.append('target_email', notifyEmail);

      try {
        const res = await fetch('/api/send-verification-email', { method: 'POST', body: formData });
        const data = await res.json();
        if (res.ok && data.success) {
          alert(`🎉 ${data.message}\n\nMã xác thực 6 chữ số: [${data.code}]`);
        } else {
          alert("❌ Gửi mail thất bại: " + (data.detail || "Lỗi không xác định"));
        }
      } catch (e) { alert("Lỗi gửi email xác thực!"); }
    }

    async function handleLogout() {
      if (!confirm("Bạn có chắc muốn đăng xuất khỏi HomeNAS?")) return;
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    loadSystemStats();
    loadFiles("");
    setInterval(loadSystemStats, 10000);
  </script>
</body>
</html>
